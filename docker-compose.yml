services:
  database:
    image: mysql:8.0
    container_name: database
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  discord:
    build:
      context: .
      dockerfile: crates/discord/Dockerfile
    container_name: discord
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy

volumes:
  mysql_data:
